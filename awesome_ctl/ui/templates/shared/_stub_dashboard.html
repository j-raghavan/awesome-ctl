{% block content %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Ensure Chart.js is included here -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-gauge@0.1.9/dist/chartjs-plugin-gauge.min.js"></script>
<div id="dashboard-content">
    <h1 class="text-2xl font-semibold mb-6">Dashboard Content</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Line Chart -->
        <div class="bg-white p-4 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4">Health</h2>
            <canvas id="lineChart"></canvas>
        </div>
        <!-- Bar Chart -->
        <div class="bg-white p-4 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4">Events</h2>
            <canvas id="barChart"></canvas>
        </div>
    </div>
</div>
<script>
    function initializeCharts() {
        // Destroy existing charts if they exist
        if (window.lineChartInstance) {
            window.lineChartInstance.destroy();
        }
        if (window.barChartInstance) {
            window.barChartInstance.destroy();
        }

        // Line Chart
        const ctxLine = document.getElementById('lineChart').getContext('2d');
        window.lineChartInstance = new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: ['January', 'February', 'March', 'April', 'May', 'June', 'July'],
                datasets: [{
                    label: 'Cluster Health',
                    data: [65, 59, 80, 81, 56, 55, 40],
                    borderColor: 'rgba(75, 192, 192, 1)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        // Bar Chart
        const ctxBar = document.getElementById('barChart').getContext('2d');
        window.barChartInstance = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
                datasets: [{
                    label: 'Events',
                    data: [12, 19, 3, 5, 2, 3],
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)',
                        'rgba(255, 206, 86, 0.2)',
                        'rgba(75, 192, 192, 0.2)',
                        'rgba(153, 102, 255, 0.2)',
                        'rgba(255, 159, 64, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(75, 192, 192, 1)',
                        'rgba(153, 102, 255, 1)',
                        'rgba(255, 159, 64, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    }

    // Initialize charts when the content is loaded
    document.addEventListener('DOMContentLoaded', initializeCharts);

    // Re-initialize charts when HTMX replaces the content
    document.body.addEventListener('htmx:afterSettle', function (evt) {
        if (evt.detail.target.id === 'main-content') {
            initializeCharts();
        }
    });
</script>
{% endblock %}
